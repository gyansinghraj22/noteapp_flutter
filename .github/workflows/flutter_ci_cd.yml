name: Flutter APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # ☕ Java setup
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 🐦 Flutter setup (FIXED VERSION)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'

      # 🔍 Verify versions
      - name: Check Flutter & Dart version
        run: |
          flutter --version
          dart --version

      # 🧹 Clean
      - name: Clean project
        run: flutter clean

      # 📦 Dependencies
      - name: Install dependencies
        run: flutter pub get

      # 🔨 Build APK
      - name: Build APK
        run: flutter build apk --release

      # 📤 Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk