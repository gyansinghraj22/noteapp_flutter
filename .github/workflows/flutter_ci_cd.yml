name: Build & Release APK

on:
  push:
    branches:
      - main
    tags:
      - "v*" # Trigger release when you push a version tag like v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Allows the token to create a Release and upload the APK
    steps:
      # 1. Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java (Required for Android builds)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      # 3. Set up Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      # 4. Get dependencies
      - name: Install dependencies
        run: flutter pub get

      # 5. Build the APK (Debug version for easy testing)
      - name: Build APK
        run: flutter build apk --debug

      # 6. Upload as an Artifact (Temporary - 90 days)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

      # 7. Create a GitHub Release (Permanent - only runs on tags)
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
